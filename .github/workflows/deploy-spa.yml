name: Deploy SPA to Cloudflare Pages

# Manual fallback deploy for the sos/ React SPA.
#
# History:
#  - 2026-04-20: Introduced with auto push-trigger after commit 72faefc3 did
#    not reach prod via CF Pages auto-build.
#  - 2026-04-22: Auto push-trigger DISABLED after it broke prod on commit
#    4254b44c. Root cause: this GH Actions job runs `npm run build` without
#    any VITE_FIREBASE_* env vars (they live in CF Pages project settings,
#    not as GH secrets), so Vite inlines empty strings → runtime error
#    "Configuration Firebase incomplète". CF Pages' own auto-build runs in
#    the CF Pages environment where the project env vars are available, so
#    it produces a valid bundle.
#  - This workflow is kept as `workflow_dispatch`-only for the original
#    fallback scenario. Before re-enabling the push trigger, add all
#    VITE_* vars from .env.production as GitHub repo secrets and reference
#    them in the Build step's `env:` block.

on:
  workflow_dispatch:

jobs:
  deploy-spa:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: sos/package-lock.json

      - name: Install dependencies
        working-directory: sos
        # `npm install` (not `npm ci`) because the repo has a known lock-file
        # drift (observed 2026-04-20: yaml@2.8.3 in package.json but missing
        # from package-lock.json). CF Pages auto-build uses `npm install`
        # implicitly for the same reason — match that tolerance so the
        # fallback deploy works out of the box, at the cost of slightly
        # less deterministic installs.
        run: npm install --prefer-offline --no-audit --no-fund

      - name: Build SPA
        working-directory: sos
        env:
          # Prebuild scripts generate firebase-config from env vars.
          # CF Pages passes them via project settings; we mirror what we know
          # is safe-public (non-secret) here. Missing optional vars are
          # tolerated by gen-firebase-config.cjs fallbacks.
          CI: 'true'
          NODE_OPTIONS: '--max-old-space-size=4096'
        run: npm run build

      - name: Verify build output
        working-directory: sos
        run: |
          if [ ! -d dist ]; then
            echo "::error::sos/dist does not exist — build likely failed silently"
            exit 1
          fi
          if [ ! -f dist/index.html ]; then
            echo "::error::sos/dist/index.html missing — incomplete build"
            exit 1
          fi
          CHUNKS=$(find dist/assets -name '*.js' 2>/dev/null | wc -l)
          echo "Build OK: $CHUNKS JS chunks produced"
          if [ "$CHUNKS" -lt 5 ]; then
            echo "::error::Only $CHUNKS JS chunks — suspiciously low, aborting deploy"
            exit 1
          fi

      - name: Deploy to Cloudflare Pages (project sos-expat, branch main)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: fe7c0b2676e091898d565b8eba1544ad
          command: pages deploy sos/dist --project-name=sos-expat --branch=main --commit-dirty=true

      - name: Post-deploy summary
        if: success()
        run: |
          echo "✅ SPA deployed to Cloudflare Pages project 'sos-expat' on branch 'main'"
          echo "    Commit: ${{ github.sha }}"
          echo "    Rollback (if needed): CF Pages dashboard → Deployments → Restore previous"
