name: Gmail Google Alerts → Telegram

# Runs every 15 minutes, reads unread Google Alerts from williamsjullin@gmail.com
# via Gmail API, posts them to Telegram chat 7560535072, marks as read.
#
# Zero VPS needed. Secrets used:
#   - GMAIL_OAUTH_CLIENT_ID
#   - GMAIL_OAUTH_CLIENT_SECRET
#   - GMAIL_OAUTH_REFRESH_TOKEN
#   - TELEGRAM_BOT_TOKEN
#   - TELEGRAM_PRESS_CHAT_ID (optional, defaults to 7560535072 in the script)

on:
  schedule:
    - cron: "*/15 * * * *"  # every 15 minutes
  workflow_dispatch:
    # Manual trigger for testing

permissions:
  contents: read

# Only one run at a time — avoids double-processing an alert if a run overruns.
concurrency:
  group: gmail-alerts-bridge
  cancel-in-progress: false

jobs:
  bridge:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scripts/gmail-alerts-bridge/requirements.txt

      - name: Install deps
        run: pip install -r scripts/gmail-alerts-bridge/requirements.txt

      - name: Run bridge
        env:
          GMAIL_OAUTH_CLIENT_ID: ${{ secrets.GMAIL_OAUTH_CLIENT_ID }}
          GMAIL_OAUTH_CLIENT_SECRET: ${{ secrets.GMAIL_OAUTH_CLIENT_SECRET }}
          GMAIL_OAUTH_REFRESH_TOKEN: ${{ secrets.GMAIL_OAUTH_REFRESH_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_PRESS_CHAT_ID: ${{ secrets.TELEGRAM_PRESS_CHAT_ID }}
        run: python3 scripts/gmail-alerts-bridge/gmail-to-telegram.py
