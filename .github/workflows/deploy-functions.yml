name: Deploy Firebase Functions

on:
  push:
    branches:
      - main
    paths:
      - 'sos/firebase/functions/**'
  workflow_dispatch: # Allow manual trigger

jobs:
  deploy:
    name: Deploy to Firebase
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: sos/firebase/functions/package-lock.json

      - name: Install dependencies
        working-directory: sos/firebase/functions
        run: npm ci

      - name: Build functions
        working-directory: sos/firebase/functions
        run: npm run build

      - name: Setup Firebase CLI
        run: npm install -g firebase-tools

      - name: Authenticate with GCP
        run: |
          echo '${{ secrets.GCP_SA_KEY }}' > /tmp/gcp-key.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp-key.json
          gcloud auth activate-service-account --key-file=/tmp/gcp-key.json

      - name: Create .env file
        working-directory: sos/firebase/functions
        run: |
          cat > .env << 'EOF'
          FUNCTIONS_REGION=europe-west1
          FRONTEND_URL=https://www.sosexpats.com
          FUNCTIONS_URL=https://europe-west1-sos-urgently-ac307.cloudfunctions.net
          FUNCTIONS_BASE_URL=https://europe-west1-sos-urgently-ac307.cloudfunctions.net
          CLOUD_TASKS_QUEUE=call-scheduler-queue
          CLOUD_TASKS_LOCATION=europe-west3
          CLOUD_TASKS_PAYOUT_QUEUE=payout-retry-queue
          EXECUTE_CALL_TASK_URL=https://executecalltask-5tfnuxa2hq-ey.a.run.app
          SET_PROVIDER_AVAILABLE_TASK_URL=https://setprovideravailabletask-5tfnuxa2hq-ey.a.run.app
          TWILIO_CALL_WEBHOOK_URL=https://twiliocallwebhook-5tfnuxa2hq-ey.a.run.app
          TWILIO_CONFERENCE_WEBHOOK_URL=https://twilioconferencewebhook-5tfnuxa2hq-ey.a.run.app
          PROVIDER_NO_ANSWER_TWIML_URL=https://providernoanswertwiml-5tfnuxa2hq-ey.a.run.app
          TWILIO_AMD_TWIML_URL=https://twilioamdtwiml-5tfnuxa2hq-ey.a.run.app
          TWILIO_GATHER_RESPONSE_URL=https://twiliogatherresponse-5tfnuxa2hq-ey.a.run.app
          FORCE_END_CALL_TASK_URL=https://forceendcalltask-5tfnuxa2hq-ey.a.run.app
          BUSY_SAFETY_TIMEOUT_TASK_URL=https://busysafetytimeouttask-5tfnuxa2hq-ey.a.run.app
          RECORDING_RETENTION_DAYS=90
          STRIPE_MODE=live
          PAYPAL_MODE=live
          GA4_MEASUREMENT_ID=G-6855B6E2FB
          WISE_MODE=sandbox
          FLUTTERWAVE_MODE=sandbox
          MAILWIZZ_API_URL=https://mail.sos-expat.com/api/index.php
          MAILWIZZ_LIST_UID=yl089ehqpgb96
          MAILWIZZ_CUSTOMER_ID=2
          MAILWIZZ_LIST_CHATTER_RECRUTEMENT=ye577s0s75c99
          MAILWIZZ_LIST_CHATTER_ONBOARDING=yr810av4z5275
          MAILWIZZ_LIST_IA_PROSPECTS=
          OUTIL_INGEST_ENDPOINT=https://europe-west1-outils-sos-expat.cloudfunctions.net/ingestBooking
          EXECUTE_PAYOUT_RETRY_TASK_URL=
          EXECUTE_STRIPE_TRANSFER_RETRY_URL=
          SLACK_SECURITY_WEBHOOK_URL=
          EOF

      # ----------------------------------------------------------------
      # Count expected functions from source code (before deploy)
      # ----------------------------------------------------------------
      - name: Count expected functions from source
        working-directory: sos/firebase
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp-key.json
        run: |
          echo "Listing functions that Firebase CLI detects from source..."
          firebase functions:list --project sos-urgently-ac307 2>/dev/null \
            | tee /tmp/expected_functions.txt || true

      # ----------------------------------------------------------------
      # Deploy: passe 1 complète, puis passes incrémentales sur les échecs
      # ----------------------------------------------------------------
      - name: Deploy functions (incremental passes)
        working-directory: sos/firebase
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp-key.json
        run: |
          set +e  # Don't exit on error — we handle it ourselves
          PROJECT="sos-urgently-ac307"
          MAX_PASSES=6
          WAIT_BETWEEN=90

          # ── Helper: extract failed function names from Firebase output ──
          # Firebase CLI outputs errors like:
          #   ✖  functions[myFunction(us-central1)] Deployment error.
          #   Failed to create function myFunction in region us-central1
          #   Could not update function myFunction
          #   functions[myFunc(europe-west1)]: Quota exceeded
          extract_failed() {
            local log_file="$1"
            > /tmp/failed_functions.txt
            > /tmp/failed_raw.txt

            # Pattern 1: "✖  functions[funcName(region)]" (most common)
            grep -oP '✖\s+functions\[\K[^(]+' "$log_file" >> /tmp/failed_raw.txt 2>/dev/null

            # Pattern 2: "Failed to create/update function funcName"
            grep -oP 'Failed to (create|update|delete) function \K\S+' "$log_file" >> /tmp/failed_raw.txt 2>/dev/null

            # Pattern 3: "Could not (create|update) function ... funcName"
            grep -oP 'Could not \w+ (?:cloud )?function[s]? \K\S+' "$log_file" >> /tmp/failed_raw.txt 2>/dev/null

            # Pattern 4: "functions[funcName(region)]: ... error/quota/429"
            grep -iP 'functions\[[^\]]+\].*?(error|quota|429|RESOURCE_EXHAUSTED|failed)' "$log_file" \
              | grep -oP 'functions\[\K[^(]+' >> /tmp/failed_raw.txt 2>/dev/null

            # Deduplicate and clean
            if [ -f /tmp/failed_raw.txt ]; then
              cat /tmp/failed_raw.txt | sed 's/[[:space:]]*$//' | sort -u > /tmp/failed_functions.txt
              rm -f /tmp/failed_raw.txt
            fi
          }

          # ── PASSE 1: déploiement complet ──
          echo ""
          echo "=========================================="
          echo "  PASSE 1/6 — Déploiement complet"
          echo "=========================================="
          firebase deploy --only functions --project "$PROJECT" --force 2>&1 | tee /tmp/deploy_pass.txt
          EXIT=${PIPESTATUS[0]}

          if [ $EXIT -eq 0 ]; then
            echo "✅ Toutes les fonctions déployées en une passe !"
            exit 0
          fi
          echo "⚠️  Passe 1 terminée avec des échecs (exit $EXIT)"

          # ── PASSES 2..N: re-déployer uniquement les fonctions en échec ──
          for PASS in $(seq 2 $MAX_PASSES); do
            extract_failed /tmp/deploy_pass.txt

            FAILED_COUNT=$(wc -l < /tmp/failed_functions.txt | tr -d '[:space:]')
            if [ "$FAILED_COUNT" -eq 0 ]; then
              echo ""
              echo "✅ Aucune fonction en échec détectée — déploiement terminé !"
              exit 0
            fi

            # Build --only functions:fn1,functions:fn2,...
            ONLY_ARG=$(cat /tmp/failed_functions.txt | sed 's/^/functions:/' | paste -sd ',' -)

            echo ""
            echo "=========================================="
            echo "  PASSE $PASS/$MAX_PASSES — $FAILED_COUNT fonction(s) en échec"
            echo "=========================================="
            cat /tmp/failed_functions.txt | while read fn; do echo "  - $fn"; done
            echo ""
            echo "Attente ${WAIT_BETWEEN}s avant re-déploiement..."
            sleep $WAIT_BETWEEN

            firebase deploy --only "$ONLY_ARG" --project "$PROJECT" --force 2>&1 | tee /tmp/deploy_pass.txt
            EXIT=${PIPESTATUS[0]}

            if [ $EXIT -eq 0 ]; then
              echo "✅ Passe $PASS réussie — toutes les fonctions restantes déployées !"
              exit 0
            fi

            echo "⚠️  Passe $PASS terminée avec des échecs (exit $EXIT)"
          done

          # ── Après toutes les passes ──
          extract_failed /tmp/deploy_pass.txt
          REMAINING=$(wc -l < /tmp/failed_functions.txt | tr -d '[:space:]')
          if [ "$REMAINING" -gt 0 ]; then
            echo ""
            echo "❌ Après $MAX_PASSES passes, $REMAINING fonction(s) toujours en échec :"
            cat /tmp/failed_functions.txt
            echo ""
            echo "Dernières erreurs :"
            grep -iE "error|fail|could not" /tmp/deploy_pass.txt | tail -30
            exit 1
          fi

          echo "✅ Déploiement complet !"

      # ----------------------------------------------------------------
      # Vérification: comparer fonctions déployées vs fonctions attendues
      # ----------------------------------------------------------------
      - name: Verify all functions are deployed
        working-directory: sos/firebase
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp-key.json
        run: |
          set +e
          PROJECT="sos-urgently-ac307"

          echo "=========================================="
          echo "  VÉRIFICATION POST-DÉPLOIEMENT"
          echo "=========================================="

          # 1. List all deployed functions from GCP
          echo ""
          echo "Récupération des fonctions déployées sur GCP..."
          gcloud functions list --project "$PROJECT" --format="value(name)" 2>/dev/null \
            | sed 's|.*/||' \
            | sort -u > /tmp/deployed_functions.txt

          DEPLOYED_COUNT=$(wc -l < /tmp/deployed_functions.txt | tr -d '[:space:]')
          echo "Fonctions déployées sur GCP : $DEPLOYED_COUNT"

          # 2. List expected functions from Firebase CLI source analysis
          echo ""
          echo "Analyse des fonctions déclarées dans le code source..."
          firebase deploy --only functions --project "$PROJECT" --dry-run 2>&1 \
            | grep -oP '(?:✔|i)\s+functions:\s+\K\S+' \
            | sort -u > /tmp/source_functions_raw.txt 2>/dev/null

          firebase deploy --only functions --project "$PROJECT" --dry-run 2>&1 \
            | tee /tmp/dryrun_output.txt \
            | grep -oP 'functions\[\K[^(]+' \
            | sort -u > /tmp/source_functions.txt 2>/dev/null

          SOURCE_COUNT=$(wc -l < /tmp/source_functions.txt | tr -d '[:space:]')
          echo "Fonctions déclarées dans le code : $SOURCE_COUNT"

          # 3. Compare
          echo ""
          echo "=========================================="
          echo "  RÉSULTAT"
          echo "=========================================="

          if [ "$DEPLOYED_COUNT" -eq 0 ]; then
            echo "⚠️  Impossible de récupérer la liste des fonctions déployées via gcloud."
            echo "    Vérifiez manuellement dans la console Firebase."
            echo "    Le deploy s'est terminé sans erreur — probablement OK."
            exit 0
          fi

          echo "📊 Fonctions déployées : $DEPLOYED_COUNT"
          if [ "$SOURCE_COUNT" -gt 0 ]; then
            echo "📊 Fonctions attendues  : $SOURCE_COUNT"

            # Find missing functions
            comm -23 /tmp/source_functions.txt /tmp/deployed_functions.txt > /tmp/missing_functions.txt 2>/dev/null
            MISSING_COUNT=$(wc -l < /tmp/missing_functions.txt | tr -d '[:space:]')

            if [ "$MISSING_COUNT" -gt 0 ]; then
              echo ""
              echo "⚠️  $MISSING_COUNT fonction(s) manquante(s) :"
              cat /tmp/missing_functions.txt | while read fn; do echo "  ❌ $fn"; done
              echo ""
              echo "Ces fonctions sont dans le code mais pas déployées."
              exit 1
            fi
          fi

          if [ "$DEPLOYED_COUNT" -ge 800 ]; then
            echo "✅ $DEPLOYED_COUNT fonctions déployées — tout est bon !"
          else
            echo "⚠️  Seulement $DEPLOYED_COUNT fonctions déployées (attendu 800+)."
            echo "    Vérifiez s'il n'y a pas de fonctions manquantes."
            exit 1
          fi

      # ── Post-deploy: purge caches + warm SSR ─────────────────────────
      - name: Purge Cloudflare Edge Cache
        if: success()
        run: |
          curl -s -X POST \
            "https://api.cloudflare.com/client/v4/zones/${{ secrets.CF_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}'
          echo "Edge cache purged"

      - name: Invalidate SSR Firestore Cache
        if: success()
        run: |
          curl -s -X POST \
            "https://europe-west1-sos-urgently-ac307.cloudfunctions.net/invalidateCacheEndpoint" \
            -H "x-cache-invalidation-key: ${{ secrets.CACHE_INVALIDATION_KEY }}" \
            -H "Content-Type: application/json" \
            --data '{"clearAll":true}'
          echo "SSR Firestore cache invalidated"

      - name: Warm SSR Cache (priority pages)
        if: success()
        working-directory: sos
        run: node scripts/warm-ssr-cache.js
        timeout-minutes: 15
